[module]
name = "spawner-ui"
version = "0.0.1"
kind = "app"
plane = "execution"
description = "Spark execution plane and local dashboard"
homepage = "https://github.com/vibeforge1111/vibeship-spawner-ui"
license = "AGPL-3.0-only"

[runtime]
kind = "node"
version = ">=22"
package_manager = "npm"
lockfile = "package-lock.json"

[install.dev]
commands = ["npm ci"]

[provides]
capabilities = [
  "mission.execution",
  "mission.dashboard",
]

[needs]
modules = []
capabilities = []
secrets = [
  "llm.zai.api_key",
  "llm.openai.api_key",
  "llm.anthropic.api_key",
  "llm.minimax.api_key",
  "telegram.relay_secret",
]

[claims]
secrets = []
ports = [3333]
routes = [
  "http.api.providers",
  "http.api.spark.run",
  "http.api.mission-control.board",
  "http.api.mission-control.command",
]

[secrets.llm_zai_api_key]
prompt = "Z.AI API key for Spawner mission execution"
required = false
storage = "keychain"
env_var = "ZAI_API_KEY"

[secrets.llm_openai_api_key]
prompt = "OpenAI API key for Spawner mission execution"
required = false
storage = "keychain"
env_var = "OPENAI_API_KEY"

[secrets.llm_anthropic_api_key]
prompt = "Anthropic API key for Spawner mission execution"
required = false
storage = "keychain"
env_var = "ANTHROPIC_API_KEY"

[secrets.llm_minimax_api_key]
prompt = "MiniMax API key for Spawner mission execution"
required = false
storage = "keychain"
env_var = "MINIMAX_API_KEY"

[secrets.telegram_relay_secret]
prompt = "Local Telegram mission relay secret"
required = false
storage = "keychain"
env_var = "TELEGRAM_RELAY_SECRET"

[run.default]
command = "npm run dev"
cwd = "."
ready_check = "http://127.0.0.1:3333/api/providers"

[healthcheck]
command = "npm run health:spark"
timeout_seconds = 60
success_hint = "Spawner UI execution plane is healthy."
failure_hint = "Run `npm run health:spark` in the module home for the repair detail."

[config]
format = "env"
output = ".env"
installer_owned = true

[paths]
home = "~/.spark/modules/spawner-ui"
state = "~/.spark/state/spawner-ui"
logs = "~/.spark/logs/spawner-ui"

[profiles.telegram_starter]
role = "execution-plane"
owns = [
  "mission.execution",
  "mission.dashboard",
]
does_not_own = [
  "telegram.ingress",
  "telegram.bot_token",
]
