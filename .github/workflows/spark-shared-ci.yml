name: Spark shared CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
      - "reconcile/**"
      - "ap-01-*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  conformance:
    uses: vibeforge1111/spark-cli/.github/workflows/reusable-conformance.yml@ap-01-reusable-ci-v4
    with:
      python-version: ""
      node-version: "22"
      install-command: "npm ci"
      test-command: "npm run check"
      conformance-command: "npm run build"

  scanners:
    uses: vibeforge1111/spark-cli/.github/workflows/reusable-scanners.yml@ap-01-reusable-ci-v4
