[module]
name = "spark-harness-core"
version = "0.1.0"
kind = "runtime"
plane = "authority"
description = "Spark Genesis Harness canonical authority kernel, schemas, ledger, registry, readiness, and self-evolution contracts."
homepage = "https://github.com/vibeforge1111/spark-harness-core"
license = "MIT"

[provides]
capabilities = [
  "spark.harness.core",
  "spark.turn_intent",
  "spark.authorization",
  "spark.tool_ledger",
  "spark.readiness",
  "spark.self_evolution",
]

[needs]
modules = []
capabilities = []
secrets = []

[claims]
secrets = []
ports = []
routes = []

[healthcheck]
command = "python3 -c \"import sys; sys.path.insert(0, 'src'); from spark_harness_core.schemas import check_all_schemas; check_all_schemas(); print('spark-harness-core ok')\""
timeout_seconds = 20
success_hint = "Spark Harness Core schemas and authority kernel CLI are importable."
failure_hint = "Run `PYTHONPATH=src python3 -m unittest discover -s tests` in spark-harness-core for detail."

[profiles.genesis_harness]
default = true
